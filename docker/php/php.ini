[PHP]
; ─────────────────────────────────────────
; Configurações gerais
; ─────────────────────────────────────────
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; ─────────────────────────────────────────
; Limites
; ─────────────────────────────────────────
memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 300
max_input_time = 300

; ─────────────────────────────────────────
; Timezone
; ─────────────────────────────────────────
date.timezone = America/Sao_Paulo

; ─────────────────────────────────────────
; OPcache (desabilitado em dev para recarregar código)
; ─────────────────────────────────────────
opcache.enable = 0
