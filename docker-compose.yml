version: '3.9'

services:

  # ─────────────────────────────────────────
  # Aplicação PHP 8.4 (Laravel + Livewire)
  # ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_SLUG:-laravel}_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - app_network
    depends_on:
      - postgres
      - redis
    environment:
      - PHP_OPCACHE_ENABLE=0  # desabilitado em desenvolvimento

  # ─────────────────────────────────────────
  # Nginx
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ${APP_SLUG:-laravel}_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app_network
    depends_on:
      - app

  # ─────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ${APP_SLUG:-laravel}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-laravel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  # ─────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ${APP_SLUG:-laravel}_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network
    command: redis-server --appendonly yes

  # ─────────────────────────────────────────
  # Queue Worker (Laravel)
  # ─────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_SLUG:-laravel}_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - app_network
    depends_on:
      - postgres
      - redis
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600

# ─────────────────────────────────────────
# Volumes persistentes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────
# Rede interna
# ─────────────────────────────────────────
networks:
  app_network:
    driver: bridge
